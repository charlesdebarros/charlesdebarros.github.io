---
layout: base
---
<article class="post">

  <!-- <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>
   -->
  <header class="post-header">
    {% if page.subheadline %}
      <h1 class="post-title" itemprop="name headline">{{ page.title | escape }} </h1>
      <h2 class="p name">{{ page.subheadline }}</h2>
    {% else %}
      <h1 class="post-title" itemprop="name headline">{{ page.title | escape }}</h1>
    {% endif %}
  </header>

  <div>
    <img src="{{ page.image }}" />
  </div>

  <div class="post-content">
    {{ content }}
  </div>

</article>
